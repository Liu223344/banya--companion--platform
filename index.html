<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>伴芽｜儿童成长陪伴平台</title>
  <link rel="stylesheet" href="assets/platform.css">
</head>
<body>
  <header class="topbar">
    <a class="logo" href="#dashboard" aria-label="伴芽首页">
      <span>芽</span>
      <strong>伴芽</strong>
    </a>
    <nav class="main-nav" aria-label="主导航">
      <button data-view="dashboard" class="nav-btn active">首页</button>
      <button data-view="requests" class="nav-btn">需求广场</button>
      <button data-view="providers" class="nav-btn">陪伴者</button>
      <button data-view="orders" class="nav-btn">订单</button>
      <button data-view="messages" class="nav-btn">消息</button>
    </nav>
    <div class="role-switch" aria-label="切换身份">
      <button data-role="parent" class="role-btn active">家长端</button>
      <button data-role="provider" class="role-btn">陪伴者端</button>
      <button id="accountBtn" class="role-btn">登录/注册</button>
    </div>
  </header>

  <main class="app-shell">
    <section id="authPanel" class="panel auth-panel"></section>

    <section class="hero-panel">
      <div>
        <p class="kicker">儿童放学后陪伴 · 社区可信服务</p>
        <h1>给孩子找一个靠谱的成长陪伴者</h1>
        <p class="hero-text">伴芽把家长、认证陪伴者和孩子连接起来。家长可以发布陪伴需求，陪伴者可以接单，双方可以管理订单、发送消息、沉淀评价。</p>
        <div class="hero-actions">
          <button class="primary-btn" data-action="scroll-create">发布陪伴需求</button>
          <button class="ghost-btn" data-view="providers">查看陪伴者</button>
        </div>
      </div>
      <aside class="phone-demo" aria-label="伴芽移动端预览">
        <div class="phone-head">
          <span>伴芽</span>
          <small id="todayText"></small>
        </div>
        <div class="mini-card accent">
          <strong>今日推荐</strong>
          <p id="phoneRecommend">根据孩子年龄、地点和陪伴目标，为你推荐合适陪伴者。</p>
        </div>
        <div class="mini-card">
          <strong>服务闭环</strong>
          <p>发布需求 → 匹配沟通 → 下单陪伴 → 记录反馈 → 评价复购</p>
        </div>
      </aside>
    </section>

    <section class="stats-grid" aria-label="平台数据">
      <article>
        <strong id="statRequests">0</strong>
        <span>陪伴需求</span>
      </article>
      <article>
        <strong id="statProviders">0</strong>
        <span>陪伴者</span>
      </article>
      <article>
        <strong id="statOrders">0</strong>
        <span>进行中订单</span>
      </article>
      <article>
        <strong id="statMessages">0</strong>
        <span>沟通消息</span>
      </article>
    </section>

    <section id="dashboardView" class="view active"></section>
    <section id="requestsView" class="view"></section>
    <section id="providersView" class="view"></section>
    <section id="ordersView" class="view"></section>
    <section id="messagesView" class="view"></section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <footer class="footer">
    <p>伴芽 MVP 网站版：当前已支持 Node.js 后端、注册登录、JSON 数据库存储、需求发布、接单、订单和消息。后续可继续升级支付、地图、实名认证和 App。</p>
    <a href="banya-companion-platform.html">查看原参赛展示页</a>
  </footer>

  <script src="assets/app.js"></script>

</html>
